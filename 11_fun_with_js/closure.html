//NOTE: THAT THE NESTED/ (CHILD) FUNCTION'S EXECUTIONAL CONTEXT IS ABLE TO ACCESS DATA FROM ITS OUTER/ PARENT FUNCTION'S EXECUTIONAL CONTEXT


// UNDERSTANDING ' CLOSURE ' 


function makeFunc() {
    const name = "Mozilla";
    function displayName() {
        console.log(name);
    }
    return displayName;     // here, nested func's ref has been returned
}

const myFunc = makeFunc();       
myFunc();
// here prblm is: outer func hi gayab hogya h fir kaise hogi lexical scoping becz jis func ko return kia h that is using its own outer func's variable jo ki execute hone k baad exist hi nhi krta [due to func executional context]

    MY DOUBT WAS: but what diff exactly does this arrow make?
    Ans) The arrow function () => {} acts as a wrapper that delays the execution of clickHandler("orange"). 
    HOW?
    Because JavaScript treats a function differently depending on whether you write its name or call it with (). JavaScript sees:
                                        () => { ... }
    it creates a function:
                        function () {
                            clickHandler("orange");
                        }
But it does not execute the code inside the function yet, until the click event happens.


//============================================================================================//
=>  why arrow func was needed/ made when already func existed?

1) Shorter syntax: Arrow functions let you write functions more concisely.
2) Useful for small functions: Especially callbacks like click handlers, timers, array methods, etc.
3) Better handling of this: Arrow functions don't create their own this; they inherit it from the surrounding scope.
4) Cleaner callback code: They make functions passed as arguments easier to read.
5_ More modern JavaScript style: They were introduced as part of ES6 to make common function patterns simpler.

==> Important: "Arrow functions were not made because normal functions were insufficient. They were mainly introduced to provide shorter syntax and different behavior for this, making certain situations easier to write and understand.''
