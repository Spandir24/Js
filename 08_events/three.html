    // TASK: to make this function stored in sayDate run when 'START' button is clicked and make it stop when 'STOP' button is clicked

    let intervalId;

    const startBtn= document.querySelector('#start');
    startBtn.addEventListener('click', function(){

        // Impovement from GPT: If you click Start multiple times, you'll create multiple intervals.
        if (!intervalId) {
            intervalId= setInterval( () => {
                console.log("Hello Sana!", new Date().toTimeString());
            },3000);
        }
    });

    const stopBtn= document.querySelector('#stop');
    stopBtn.addEventListener('click', function(){
        clearInterval(intervalId);        
    });
