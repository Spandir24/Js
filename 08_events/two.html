<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>CHAI AUR CODE</h1>
    <button id="stop">Stop</button>
</body>

<script>
    // setTimeout()
    const saySana= function() {
        console.log("Sana");
    }

    const changeText= function(){
        document.querySelector('h1').innerHTML= "Best JS course!"
    }

    //setTimeout(saySana, 2000);   // only reference has to be passed of the func

    const TimeoutID= setTimeout(changeText, 2000);

    //clearTimeout()- needs refrence to the setTimeout it is being called for
    document.querySelector('#stop').addEventListener('click', function() {
        clearTimeout(TimeoutID);
        console.log("STOPPED!");
        
    })
    
</script>

</html>
